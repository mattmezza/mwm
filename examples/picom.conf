# picom config for mwm — rounded corners, shadows, fades, and open/close
# animations. Requires picom >= 11 (for the `animations` block); on Arch the
# stock `picom` package is new enough. Launch with:  picom --config this.conf &
#
# A compositor is also what makes mwm's translucent bar actually translucent
# (without one, alpha < 0xff falls back to opaque). Do NOT add the bar to
# opacity rules — its alpha is baked into the pixels by mwm.

backend = "xrender";
vsync = false;
detect-rounded-corners = true;
detect-client-opacity = true;

# --- rounded corners ---------------------------------------------------------
# picom rounds CLIENT corners (antialiased). When you let picom do it, set
# `roundcorners = 0` in mwm's config.h so the X Shape rounding doesn't fight it.
# The bar is already shaped by mwm, so exclude it here.
corner-radius = 10;
rounded-corners-exclude = [
  "class_g = 'mwm'",                       # the bar
  "window_type = 'dock'",
];

# --- shadows -----------------------------------------------------------------
shadow = true;
shadow-radius = 16;
shadow-opacity = 0.45;
shadow-offset-x = -16;
shadow-offset-y = -16;
shadow-exclude = [
  "class_g = 'mwm'",                       # no shadow on the bar
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_NET_WM_STATE@[0]:a = '_NET_WM_STATE_FULLSCREEN'",
];

# --- fading (used for opacity changes; animations cover open/close) ----------
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;

# --- animations (picom >= 11, GLX backend only) ------------------------------
# IMPORTANT: animations require backend = "glx". On this QXL VM there is no GPU,
# so glx runs on software GL and its composite-overlay window swallows all
# keyboard/mouse input (windows become uninteractable). That's why we use the
# xrender backend here — which does NOT support animations. So this block stays
# commented in the VM. On real hardware: set backend = "glx" and uncomment it.
#animations = (
#  { triggers = [ "open", "show" ];   preset = "appear";          duration = 0.18; },
#  { triggers = [ "close", "hide" ];  preset = "disappear";       duration = 0.16; },
#  { triggers = [ "geometry" ];       preset = "geometry-change"; duration = 0.20; }
#);
